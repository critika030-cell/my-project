worker_processes 1;

events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;

    # ---- HTTP: redirect to HTTPS ----
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ---- HTTPS: reverse proxy to the dashboard, behind a login prompt ----
    server {
        listen 443 ssl;
        server_name _;

        # Replace with real certs (see DEPLOYMENT.md for options: ACM+ALB,
        # Let's Encrypt/certbot, or an internal CA). These paths assume certs
        # are mounted into the container at /etc/nginx/certs/.
        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;

        # Team login — see DEPLOYMENT.md for how to generate .htpasswd.
        # Swap this block for an OAuth2/SSO proxy if your org needs that
        # instead of shared basic-auth credentials.
        auth_basic           "Security Group Risk Dashboard";
        auth_basic_user_file /etc/nginx/.htpasswd;

        location / {
            proxy_pass http://app:5001;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # Scans (especially --all-regions plus a local Ollama summary)
            # can take a while — don't let the proxy time out early.
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }
    }
}
